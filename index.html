<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "San Francisco", sans-serif;
      letter-spacing: -0.01em;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 3px;
      width: 100%;
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* ── Empty-column drop zone ── */
    .empty-slot {
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 12px;
      border: 1.5px dashed rgba(0,0,0,0.13);
      background: rgba(0,0,0,0.025);
      transition: background .15s, border-color .15s;
      box-sizing: border-box;
    }

    .empty-slot.drop-ready {
      border-color: rgba(0,122,255,0.45);
      background: rgba(0,122,255,0.06);
    }

    /* ── Card flip ── */
    .card-flip-wrapper {
      width: 100%;
      perspective: 400px;
    }

    .card-flip-inner {
      width: 100%;
      position: relative;
      transform-style: preserve-3d;
    }

    /* Flip animation: rotates the inner around Y */
    @keyframes flipIn {
      0%   { transform: rotateY(-90deg) scale(.96); }
      60%  { transform: rotateY(8deg)   scale(1.02); }
      100% { transform: rotateY(0deg)   scale(1); }
    }

    .card-flip-inner.flipping {
      animation: flipIn .32s cubic-bezier(.22,.68,0,1.15) forwards;
    }

    /* ── Cards ── */
    .card {
      width: 100%;
      aspect-ratio: 3 / 4;
      font-size: 11px;
      font-weight: 500;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .14s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .14s ease,
                  opacity .22s ease;
      will-change: transform, opacity;
    }

    .card-face {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 2px;
    }

    .card-value { font-size: 11px; font-weight: 600; }
    .card-suit  { font-size: 10px; opacity: 0.55; }

    .card:active { transform: scale(.96); }

    /* Selected lift */
    .card.selected {
      transform: translateY(-3px) scale(1.05) !important;
      box-shadow: 0 6px 18px rgba(0,0,0,0.14) !important;
      z-index: 10;
    }

    /* Cards in a selected drag-group */
    .card.in-selection {
      box-shadow: 0 0 0 1.5px rgba(0,122,255,0.35) inset;
    }

    /* ── Deal drop animation ── */
    @keyframes dealDrop {
      0%   { opacity: 0; transform: translateY(-22px) scale(.92); }
      65%  { opacity: 1; transform: translateY(3px)  scale(1.02); }
      100% { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .dealing { animation: dealDrop .28s cubic-bezier(.22,.68,0,1.2) both; }

    /* ── Fade-out for completed sequences ── */
    @keyframes fadeRemove {
      0%   { opacity: 1; transform: scale(1); }
      60%  { opacity: 0; transform: scale(.88) translateY(-6px); }
      100% { opacity: 0; }
    }

    .removing {
      animation: fadeRemove .38s cubic-bezier(.4,0,.2,1) forwards;
      pointer-events: none;
    }

    /* ── Ambient float ── */
    @keyframes floatA {
      0%,100% { transform: translateY(0px);    }
      50%     { transform: translateY(-1.5px); }
    }
    @keyframes floatB {
      0%,100% { transform: translateY(-0.8px); }
      50%     { transform: translateY(0.8px);  }
    }
    @keyframes floatC {
      0%,100% { transform: translateY(0px);   }
      40%     { transform: translateY(-1px);  }
      80%     { transform: translateY(0.6px); }
    }
    @keyframes floatD {
      0%,100% { transform: translateY(-0.5px); }
      55%     { transform: translateY(1px);    }
    }

    .float-a { animation: floatA 5.2s ease-in-out infinite; }
    .float-b { animation: floatB 6.1s ease-in-out infinite; }
    .float-c { animation: floatC 4.8s ease-in-out infinite; }
    .float-d { animation: floatD 5.7s ease-in-out infinite; }

    /* Pause float during interactions */
    .card.selected,
    .card.in-selection,
    .card.removing,
    .card:active { animation: none !important; }

    /* ── Stats bar ── */
    #stats { display: flex; gap: 10px; align-items: center; }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 3px;
      background: rgba(0,0,0,0.05);
      border-radius: 20px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(0,0,0,0.5);
      transition: background .2s, color .2s;
    }

    .stat-pill.highlight {
      background: rgba(52,199,89,0.12);
      color: rgb(34,139,57);
    }

    .stat-icon { font-size: 10px; }

    /* ── Score pop ── */
    @keyframes scorePop {
      0%   { opacity:0; transform: translateY(0)    scale(.8); }
      30%  { opacity:1; transform: translateY(-14px) scale(1); }
      80%  { opacity:1; transform: translateY(-22px) scale(1); }
      100% { opacity:0; transform: translateY(-26px) scale(.9); }
    }

    .score-pop {
      position: fixed;
      font-size: 13px;
      font-weight: 700;
      pointer-events: none;
      z-index: 999;
      animation: scorePop .9s cubic-bezier(.4,0,.2,1) forwards;
    }

    /* ── Splash screen ── */
    @keyframes splashFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes splashFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; pointer-events: none; }
    }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      cursor: pointer;
    }

    #splash.hiding {
      animation: splashFadeOut .55s cubic-bezier(.4,0,.2,1) forwards;
    }

    .splash-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #fff;
      animation: splashFadeIn .7s cubic-bezier(.22,.68,0,1.2) .15s both;
    }

    .splash-sub {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-top: 6px;
      animation: splashFadeIn .7s cubic-bezier(.22,.68,0,1.2) .3s both;
    }

    .splash-copy {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 48px;
      letter-spacing: 0.04em;
      animation: splashFadeIn .7s ease .55s both;
    }

    /* Win overlay ── */
    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(10px);
      gap: 8px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
    }

    .overlay.show { opacity: 1; pointer-events: all; }

    .overlay-title {
      font-size: 26px; font-weight: 700; letter-spacing: -0.03em;
    }

    .overlay-sub {
      font-size: 14px; color: rgba(0,0,0,0.45); letter-spacing: -0.01em;
    }
  </style>
</head>
<body class="bg-[#f2f2f7] text-black">

<div id="splash" onclick="dismissSplash()">
  <div class="splash-title">SEVEN.FOUR</div>
  <div class="splash-sub">Spider Solitaire</div>
  <div class="splash-copy">© SEVEN.FOUR. All rights reserved.</div>
</div>

<div class="min-h-screen flex flex-col">

  <header class="px-5 pt-6 pb-3 flex justify-between items-center">
    <div class="text-[17px] font-semibold tracking-tight">Spider</div>
    <div id="stats" class="text-[11px] text-gray-400 tracking-tight"></div>
  </header>

  <div class="flex-1 px-2 py-2 overflow-hidden">
    <div id="columns" class="board"></div>
  </div>

  <div class="p-4 flex gap-2">
    <button id="deal-btn" onclick="dealFromStock()" class="flex-1 bg-white border border-gray-200 rounded-2xl py-3 text-[13px] font-medium tracking-tight active:scale-95 shadow-sm">
      Deal
    </button>
    <button onclick="startGame()" class="flex-1 bg-black text-white rounded-2xl py-3 text-[13px] font-medium tracking-tight active:scale-95 shadow-sm">
      Restart
    </button>
  </div>

</div>

<div id="overlay" class="overlay">
  <div class="overlay-title">🎉 Completed!</div>
  <div id="overlay-score" class="overlay-sub"></div>
  <button onclick="startGame()" class="mt-4 bg-black text-white rounded-2xl px-8 py-3 text-[14px] font-semibold tracking-tight active:scale-95">
    Play Again
  </button>
</div>

<script>
let columns = [];
let stock   = [];
let selected = null;
let score = 500, completed = 0, moves = 0;
let best = parseInt(localStorage.getItem("spider_best") || "0");

// Track which card positions should play the flip animation this render pass
// key: "colIndex-cardIndex", value: true
let flipSet = new Set();

function label(v){ return v===1?"A":v===11?"J":v===12?"Q":v===13?"K":String(v); }

function createDeck() {
  const deck = [];
  for (let i = 0; i < 8; i++)
    for (let v = 1; v <= 13; v++)
      deck.push({ value: v, id: `${i}-${v}-${Math.random()}` });
  return shuffle(deck);
}

function shuffle(a){ return [...a].sort(() => Math.random() - 0.5); }
function canStack(a, b){ return a.value === b.value + 1; }

function isFullSequence(stack) {
  if (stack.length < 13) return false;
  for (let i = 0; i < 12; i++)
    if (stack[i].value !== stack[i+1].value + 1) return false;
  return stack[0].value === 13 && stack[12].value === 1;
}

function startGame() {
  const deck = createDeck();
  columns = Array.from({ length: 10 }, () => []);
  for (let i = 0; i < 54; i++)
    columns[i % 10].push({ ...deck[i], faceUp: i >= 44 });
  stock = deck.slice(54);
  score = 500; completed = 0; selected = null; moves = 0;
  flipSet = new Set();
  document.getElementById("overlay").classList.remove("show");
  render();
}

function handleClick(colIndex, cardIndex) {
  const card = columns[colIndex][cardIndex];
  if (!card.faceUp) return;

  if (!selected) {
    selected = { colIndex, cardIndex };
  } else {
    if (selected.colIndex === colIndex && selected.cardIndex === cardIndex) {
      selected = null;
    } else {
      move(selected, colIndex);
      selected = null;
    }
  }
  render();
}

function handleEmptyClick(colIndex) {
  if (!selected) return;
  move(selected, colIndex);
  selected = null;
  render();
}

function move(from, targetCol) {
  if (!from) return;

  const moving = columns[from.colIndex].slice(from.cardIndex);
  const target = columns[targetCol];
  const top    = target[target.length - 1];

  if (target.length === 0 || canStack(top, moving[0])) {
    columns[from.colIndex] = columns[from.colIndex].slice(0, from.cardIndex);
    columns[targetCol]     = [...target, ...moving];

    const sourceCol  = columns[from.colIndex];
    const newTopCard = sourceCol[sourceCol.length - 1];

    if (newTopCard && !newTopCard.faceUp) {
      // Mark for flip animation before flipping
      flipSet.add(`${from.colIndex}-${sourceCol.length - 1}`);
      newTopCard.faceUp = true;
    }

    score--; moves++;
    checkCompletion(targetCol);
  }
}

function checkCompletion(colIndex) {
  const col = columns[colIndex];
  if (col.length < 13) return;

  const last13 = col.slice(-13);
  if (isFullSequence(last13)) {
    animateRemoval(colIndex, () => {
      columns[colIndex] = columns[colIndex].slice(0, -13);
      completed++;
      score += 100;

      const newTop = columns[colIndex][columns[colIndex].length - 1];
      if (newTop && !newTop.faceUp) {
        flipSet.add(`${colIndex}-${columns[colIndex].length - 1}`);
        newTop.faceUp = true;
      }

      if (completed === 8) {
        if (score > best) { best = score; localStorage.setItem("spider_best", best); }
        document.getElementById("overlay-score").textContent = `${score} pts · ${moves} moves`;
        document.getElementById("overlay").classList.add("show");
      }

      showScorePop("+100", "rgb(34,139,57)");
      render();
    });
  }
}

function animateRemoval(colIndex, callback) {
  const container = document.getElementById("columns");
  const colDiv    = container.querySelectorAll(".col")[colIndex];
  if (!colDiv) { callback(); return; }

  const cards     = colDiv.querySelectorAll(".card");
  const toAnimate = Array.from(cards).slice(Math.max(0, cards.length - 13));
  let done = 0;
  if (!toAnimate.length) { callback(); return; }

  toAnimate.forEach((el, i) => {
    el.style.animationDelay = `${i * 18}ms`;
    el.classList.add("removing");
    el.addEventListener("animationend", () => {
      if (++done === toAnimate.length) callback();
    }, { once: true });
  });
}

function showScorePop(text, color) {
  const el = document.createElement("div");
  el.className   = "score-pop";
  el.textContent = text;
  el.style.color = color;
  el.style.top   = "80px";
  el.style.left  = "50%";
  el.style.transform = "translateX(-50%)";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

let dealingSet = new Set();

function dealFromStock() {
  if (stock.length < 10) return;
  dealingSet = new Set();
  for (let i = 0; i < 10; i++) {
    columns[i].push({ ...stock.shift(), faceUp: true, dealing: true });
    dealingSet.add(i);
  }
  score -= 10;
  showScorePop("−10", "rgba(0,0,0,0.35)");
  render();
  setTimeout(() => {
    columns.forEach(col => { const t = col[col.length - 1]; if (t) delete t.dealing; });
    dealingSet = new Set();
  }, 700);
}

function render() {
  // Deal button
  const dealBtn = document.getElementById("deal-btn");
  if (dealBtn) {
    const deals = Math.floor(stock.length / 10);
    if (deals > 0) {
      dealBtn.disabled      = false;
      dealBtn.style.opacity = "1";
      dealBtn.innerHTML     = `Deal <span style="opacity:.45;font-size:11px;margin-left:3px">${deals} left</span>`;
    } else {
      dealBtn.disabled      = true;
      dealBtn.style.opacity = "0.35";
      dealBtn.textContent   = "No deals left";
    }
  }

  // Stats
  const statsEl    = document.getElementById("stats");
  const goodScore  = score >= 500;
  statsEl.innerHTML = `
    <div class="stat-pill ${goodScore ? "highlight" : ""}">
      <span class="stat-icon">◆</span>${score}
    </div>
    <div class="stat-pill">
      <span class="stat-icon">✓</span>${completed}/8
    </div>
    <div class="stat-pill">
      <span class="stat-icon">↗</span>${best}
    </div>
  `;

  const container = document.getElementById("columns");
  container.innerHTML = "";

  columns.forEach((col, colIndex) => {
    const colDiv = document.createElement("div");
    colDiv.className = "col";

    if (col.length === 0) {
      const slot = document.createElement("div");
      slot.className = "empty-slot" + (selected ? " drop-ready" : "");
      slot.onclick   = () => handleEmptyClick(colIndex);
      colDiv.appendChild(slot);
      container.appendChild(colDiv);
      return;
    }

    const spacing = Math.max(-12, -Math.floor(120 / (col.length + 1)));

    col.forEach((card, cardIndex) => {
      // Wrapper holds perspective + flip animation
      const wrapper = document.createElement("div");
      wrapper.className    = "card-flip-wrapper";
      wrapper.style.marginTop = cardIndex === 0 ? "0px" : spacing + "px";

      const inner = document.createElement("div");
      inner.className = "card-flip-inner";

      // Should this card play the flip animation?
      const flipKey = `${colIndex}-${cardIndex}`;
      if (flipSet.has(flipKey)) {
        inner.classList.add("flipping");
        // Clean up after animation so it doesn't replay on next render
        inner.addEventListener("animationend", () => {
          inner.classList.remove("flipping");
          flipSet.delete(flipKey);
        }, { once: true });
      }

      const el = document.createElement("div");
      el.className = "card";

      if (card.faceUp) {
        el.classList.add("bg-white","border","border-gray-200","shadow-sm");
        el.innerHTML = `<div class="card-face"><div class="card-value">${label(card.value)}</div><div class="card-suit">♠</div></div>`;

        // Ambient float — stable variant from card id
        const seed     = card.id ? card.id.charCodeAt(0) + card.id.charCodeAt(2) : cardIndex;
        const variants = ["float-a","float-b","float-c","float-d"];
        el.classList.add(variants[seed % 4]);
        el.style.animationDelay = `-${(seed % 53) * 0.11}s`;
      } else {
        el.classList.add("bg-gray-200");
      }

      if (card.dealing) {
        // Animate the wrapper so deal-drop is independent of card-level float/flip
        wrapper.style.animation = `dealDrop .28s cubic-bezier(.22,.68,0,1.2) ${colIndex * 38}ms both`;
      }

      const isSelected = selected && selected.colIndex === colIndex && selected.cardIndex === cardIndex;
      const inGroup    = selected && selected.colIndex === colIndex && cardIndex > selected.cardIndex;

      if (isSelected) el.classList.add("selected");
      if (inGroup)    el.classList.add("in-selection");

      el.onclick = () => handleClick(colIndex, cardIndex);

      inner.appendChild(el);
      wrapper.appendChild(inner);
      colDiv.appendChild(wrapper);
    });

    container.appendChild(colDiv);
  });

  // Clear flip set after render (any remaining keys weren't matched)
  flipSet.clear();
}

function dismissSplash() {
  const splash = document.getElementById("splash");
  if (!splash) return;
  splash.classList.add("hiding");
  splash.addEventListener("animationend", () => splash.remove(), { once: true });
}

// Auto-dismiss after 2.2s
setTimeout(dismissSplash, 2200);

startGame();
</script>

</body>
</html>
